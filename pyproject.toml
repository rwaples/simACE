[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "sim-ace"
version = "0.1.0"
description = "ACE pedigree simulation with A/C/E variance components"
requires-python = ">=3.10"
dependencies = [
    "numpy", "scipy", "pandas", "pyarrow", "pyyaml",
    "matplotlib", "seaborn",
]

[project.optional-dependencies]
accel = ["numba"]
dev = ["snakemake", "snakefmt", "pytest", "ruff>=0.8"]

[project.scripts]
sim-ace-simulate = "sim_ace.simulate:cli"
sim-ace-phenotype = "sim_ace.phenotype:cli"
sim-ace-threshold = "sim_ace.threshold:cli"
sim-ace-sample = "sim_ace.sample:cli"
sim-ace-validate = "sim_ace.validate:cli"
sim-ace-phenotype-stats = "sim_ace.stats:cli"
sim-ace-simple-ltm-stats = "sim_ace.simple_ltm_stats:cli"
sim-ace-gather = "sim_ace.gather:cli"
sim-ace-plot-phenotype = "sim_ace.plot_phenotype:cli"
sim-ace-plot-simple-ltm = "sim_ace.plot_simple_ltm:cli"
sim-ace-plot-validation = "sim_ace.plot_validation:cli"

[tool.setuptools.packages.find]
include = ["sim_ace*"]

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [".snakemake", "epimight/EPIMIGHT", "notes"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",   # line too long — formatter handles wrapping
    "E741",   # ambiguous variable name — scientific code uses l, n, k
    "B028",   # no explicit stacklevel in warnings.warn
    "B905",   # zip-without-explicit-strict — intentional
    "SIM108", # use ternary — often less readable
    "SIM117", # combine nested with statements
    "UP015",  # unnecessary open mode parameter
    "RUF002", # ambiguous unicode in docstring — scientific notation (×)
    "RUF003", # ambiguous unicode in comment — scientific notation (×)
]

[tool.ruff.lint.per-file-ignores]
"workflow/scripts/*.py" = ["F821", "B018"]  # snakemake global injected at runtime; bare name check idiom
"tests/*.py" = ["B011", "RUF012"]            # assert False; mutable class attrs OK in tests
"sim_ace/__init__.py" = ["E402", "F401"]    # re-exports after logging setup
"sim_ace/plot_phenotype.py" = ["E402"]      # yaml_loader() before imports
"sim_ace/plot_simple_ltm.py" = ["E402"]     # yaml_loader() before imports
"sim_ace/plot_validation.py" = ["E402"]     # yaml_loader() before imports

[tool.ruff.lint.isort]
known-first-party = ["sim_ace", "epimight"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
