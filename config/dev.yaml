    trait1: { A: 0.1, C: 0.5, E: 0.4 }

# ─── Edge case: σ²_E below the ε² = 0.25 floor ────────────────────────
# Probes the σ²_E_fit ≥ 0 clamp effect on the threshold-scale output.

dev_laplace_low_e:
  seed: 70300
  N: 3400
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.6, C: 0.3, E: 0.1 }  # σ²_E=0.1 < ε²=0.25

# ─── Prevalence sweep ─────────────────────────────────────────────────
# N=3400, ACE = (0.5, 0.2, 0.3), no AM.  τ shifts with K; rarer traits
# stress the tail-probability approximation.

dev_laplace_K_rare:
