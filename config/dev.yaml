# Development scenarios for exercising iter_reml's Phase 2 Laplace
# binary-trait path across sample sizes, ACE variance partitions,
# prevalences, and AM regimes.  Ground truth comes from the simulator's
# Gaussian A/C/E decomposition; run_iter_reml.py thresholds the
# continuous liability at Φ⁻¹(1−K) when iter_reml_prevalence is set,
# so these scenarios all use `iter_reml_liability_model: laplace`
# (override to "mean" or leave null for Phase 1 comparison runs).
#
# N here is the per-generation founder count; with G_pheno=3 the
# phenotyped sample size is ≈ N × G_pheno.  Rough sizes for reference:
#   N=340    → ≈ 1k phenotyped
#   N=1000   → ≈ 3k
#   N=3400   → ≈ 10k
#   N=10000  → ≈ 30k
#   N=17000  → ≈ 50k

# ─── Size sweep ───────────────────────────────────────────────────────
# Fixed ACE = (0.5, 0.2, 0.3), K=0.15, no AM.  Isolates the
# sample-size dependence of Laplace bias.

dev_laplace_n1k:
  seed: 70100
  N: 340
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.5, C: 0.2, E: 0.3 }

dev_laplace_n3k:
  seed: 70101
  N: 1000
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.5, C: 0.2, E: 0.3 }

dev_laplace_n10k:
  seed: 70102
  N: 3400
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.5, C: 0.2, E: 0.3 }

dev_laplace_n30k:
  seed: 70103
  N: 10000
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.5, C: 0.2, E: 0.3 }

dev_laplace_n50k:
  seed: 70104
  N: 17000
  replicates: 1
  pedigree:
    assort1: 0.0
    trait1: { A: 0.5, C: 0.2, E: 0.3 }

# ─── Heritability sweep ───────────────────────────────────────────────
# N=3400 (~10k phenotyped), K=0.15, no AM.  Varies h² with σ²_sum=1.

dev_laplace_h2_low:
