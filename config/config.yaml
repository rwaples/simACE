    folder: long
    replicates: 1
    seed: 1879
    C1: 0.0
    C2: 0.0
    rA: 0.3
    rC: 0.0
    N: 50000
    G_sim: 35
    G_ped: 30
    G_pheno: 30
    gen_censoring:
