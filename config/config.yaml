# ACE Simulation Configuration

defaults:
  # ── Simulation ────────────────────────────────────────────────────────────
  seed: 42
  replicates: 3
  folder: base

  # ── Liability variance components ─────────────────────────────────────────
  A1: 0.5
  C1: 0.2
  A2: 0.5
  C2: 0.2
  rA: 0.3
  rC: 0.5

  standardize: true

  # ── Pedigree ──────────────────────────────────────────────────────────────
  N: 100000
  G_ped: 6
  G_pheno: 3
  G_sim: 8
  fam_size: 2.3
  p_mztwin: 0.02
  p_nonsocial_father: 0.05

  # ── Phenotype model ───────────────────────────────────────────────────────
  # phenotype_model1/2: weibull | exponential | gompertz | lognormal | loglogistic | gamma | adult_ltm | adult_cox | cure_frailty
  # phenotype_params1/2: dict of model-specific parameters
  #   frailty models: hazard distribution params (e.g. scale, rho for weibull)
  #   adult_ltm/adult_cox: cip_x0 (midpoint age), cip_k (growth rate)

  # Trait 1
  beta1: 1.0
  beta_sex1: 0.0
  phenotype_model1: weibull
  phenotype_params1:
    scale: 2160
    rho: 0.8

  # Trait 2
  beta2: 1.5
  beta_sex2: 0.0
  phenotype_model2: weibull
  phenotype_params2:
    scale: 333
    rho: 1.2

  # ── Censoring ─────────────────────────────────────────────────────────────
  censor_age: 80
  gen_censoring:
    0: [80, 80]
    1: [80, 80]
    2: [80, 80]
    3: [40, 80]
    4: [0, 80]
    5: [0, 45]
  death_scale: 164
  death_rho: 2.73

  # ── Liability threshold model ──────────────────────────────────────────────
  prevalence1: 0.10
  prevalence2: 0.20

  # ── Misc ──────────────────────────────────────────────────────────────────
  extra_tetrachoric: False
  N_sample: 0
  plot_format: png

  # ── EPIMIGHT ─────────────────────────────────────────────────────────────
  epimight_kinds:
    - PO
    - FS
    - HS
    - mHS
    - pHS
    - Av
    - 1G
    - 1C

scenarios:
