# ACE Simulation Configuration

defaults:
  # ── Simulation ────────────────────────────────────────────────────────────
  seed: 42
  replicates: 3
  folder: base

  # ── Liability variance components ─────────────────────────────────────────
  A1: 0.5
  C1: 0.2
  E1: 0.3

  A2: 0.5
  C2: 0.2
  E2: 0.3

  rA: 0.3
  rC: 0.5
  rE: 0.0

  standardize: true

  # ── Pedigree ──────────────────────────────────────────────────────────────
  N: 100000
  G_ped: 6
  G_pheno: 3
  G_sim: 8
  mating_lambda: 0.5
  p_mztwin: 0.02
  assort1: 0
  assort2: 0
  assort_matrix: null # optional full 2x2 R_mf matrix, e.g. [[0.3, 0.05], [0.05, 0.15]]

  # ── Phenotype model ───────────────────────────────────────────────────────
  # phenotype_model1/2: weibull | exponential | gompertz | lognormal | loglogistic | gamma | adult_ltm | adult_cox | cure_frailty
  # phenotype_params1/2: dict of model-specific parameters
  #   frailty models: hazard distribution params (e.g. scale, rho for weibull)
  #   adult_ltm/adult_cox: cip_x0 (midpoint age), cip_k (growth rate)

  # Trait 1
  beta1: 1.0
  beta_sex1: 0.0
  phenotype_model1: weibull
  phenotype_params1:
    scale: 2160
    rho: 0.8

  # Trait 2
  beta2: 1.5
  beta_sex2: 0.0
  phenotype_model2: weibull
  phenotype_params2:
    scale: 333
    rho: 1.2

  # ── Censoring ─────────────────────────────────────────────────────────────
  censor_age: 80
  gen_censoring:
    0: [80, 80]
    1: [80, 80]
    2: [80, 80]
    3: [40, 80]
    4: [0, 80]
    5: [0, 45]
  death_scale: 164
  death_rho: 2.73

  # ── Liability threshold model ──────────────────────────────────────────────
  prevalence1: 0.10
  prevalence2: 0.20

  # ── Misc ──────────────────────────────────────────────────────────────────
  skip_2nd_cousins: True
  N_sample: 0
  case_ascertainment_ratio: 1
  pedigree_dropout_rate: 0
  plot_format: png

  # ── EPIMIGHT ─────────────────────────────────────────────────────────────
  epimight_kinds:
    - PO
    - FS
    - HS
    - mHS
    - pHS
    - Av
    - 1G
    - 1C

  # ── PA-FGRS ────────────────────────────────────────────────────────────
  pafgrs_ndegree: 2

# Scenarios are defined in per-folder files: config/{folder}.yaml
# Each file contains bare scenario dicts. The folder name is inferred from
# the filename. See any existing config/*.yaml file for the format.
