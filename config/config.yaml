# ACE Simulation Configuration
# Default values are used unless overridden within the scenario

defaults:
  # Simulation parameters 
  seed: 42
  replicates: 3
  folder: base # Name of folder where results are stored

  # Liability parameters
  ## Trait 1 variance components (A + C <= 1.0; E = 1 - A - C)
  A1: 0.5
  C1: 0.2

  # Trait 2 variance components
  A2: 0.5
  C2: 0.2

  # Cross-trait correlations in A and C components
  rA: 0.3 # Genetic correlation
  rC: 0.5 # Common environment correlation

  # Pedigree parameters
  N: 100000 # Population size per generation
  G_ped: 6 # Number of generations to record in pedigree
  G_pheno: 3 # Number of generations to phenotype (last G_pheno of G_ped)
  G_sim: 8 # Total generations to simulate in total (G_sim - G_ped = burn-in)
  fam_size: 2.3 # Mean number of kids in a household with kids (Poisson)
  p_mztwin: 0.02 # Probability of a birth producing MZ twins
  p_nonsocial_father: 0.05 # Probabilty that a child has random father


  # Phenotype parameters
  ## Survival  model - Trait 1
  beta1: 1.0 # Effect of liability on log-hazard
  scale1: 2160 # Weibull scale (S(t) = exp(-(t/scale)^rho))
  rho1: 0.8 # Weibull shape (<1 = risk decreasing with age)

  ## Survival model - Trait 2
  beta2: 1.5
  scale2: 333
  rho2: 1.2 # Weibull shape (>1 = risk increasing with age)

  ## Shared phenotype parameters
  standardize: true # Standardize liability before phenotyping

  # Censoring parameters
  censor_age: 80 # Max censoring age
  gen_censoring:
    {
      0: [80, 80],  # zero-width window → fully censored (no cases observed)
      1: [80, 80],  # zero-width window → fully censored
      2: [80, 80],  # zero-width window → fully censored
      3: [40, 80],
      4: [0, 80],
      5: [0, 45],
    } # Per-generation [left, right] observation windows (gen 0 = oldest)
    # Should have one value per G_ped generation
  death_scale: 164 # Mortality scale (Weibull)
  death_rho: 2.73 # Mortality shape (Weibull)

  # Liability threshold model parameters
  prevalence1: 0.10 # Trait 1: top X% of liability per generation are affected
  prevalence2: 0.20 # Trait 2: top X% of liability per generation are affected

  # Statistics
  extra_tetrachoric: False # Compute tetrachoric correlations (slow; disable for faster runs)

  # Sampling
  N_sample: 0 # Subsample phenotyped individuals (0 = keep all)

  # Plot output
  plot_format: png # Plot file format: png or pdf

scenarios:
  baseline10K:
    seed: 1042
    N: 10000

  baseline100K:
    N: 100000
    seed: 2042

  baseline1M:
    seed: 3042
    N: 1000000
    extra_tetrachoric: False

  baseline2M:
    folder: extra
    seed: 99042
    replicates: 3
    N: 2000000
    extra_tetrachoric: False

  high_heritability:
    folder: heritability
    seed: 4042
    A1: 0.8
    C1: 0.0
    A2: 0.8
    C2: 0.0

  low_heritability:
    folder: heritability
    seed: 5042
    A1: 0.1
    C1: 0.1
    A2: 0.1
    C2: 0.1

  no_heritability:
    folder: heritability
    seed: 6042
    A1: 0
    C1: 0
    A2: 0
    C2: 0

  no_correlation:
    folder: cross_trait
    seed: 7042
    rA: 0 # Genetic correlation
    rC: 0 # Common environment

  high_correlation:
    folder: cross_trait
    seed: 8042
    rA: .7 # Genetic correlation
    rC: .7
    extra_tetrachoric: False

  tetra_test:
    folder: phenotype
    seed: 9042
    censor_age: 200 # Max censoring age
    gen_censoring: { 0: [0, 200], 1: [0, 200], 2: [0, 200], 3: [0, 200] }
    beta1: 20
    beta2: 20

  beta_2:
    folder: phenotype
    seed: 10042
    beta1: 2.0
    beta2: 2.0

  beta_4:
    folder: phenotype
    seed: 11042
    beta1: 4.0
    beta2: 4.0

  increasing_prevalence:
    folder: phenotype
    seed: 16042
    G_pheno: 4
    prevalence1: { 2: 0.03, 3: 0.05, 4: 0.08, 5: 0.12 }
    prevalence2: { 2: 0.03, 3: 0.05, 4: 0.08, 5: 0.12 }

  no_twins:
    folder: family
    seed: 14042
    p_mztwin: 0

  no_fullsibs:
    folder: family
    seed: 15042
    p_nonsocial_father: 1.0

  small_test:
    folder: test
    seed: 12042
    N: 1000
