# ACE Simulation Configuration

defaults:
  # ── Simulation ────────────────────────────────────────────────────────────
  seed: 42
  replicates: 3
  folder: base

  # ── Liability variance components ─────────────────────────────────────────
  A1: 0.5
  C1: 0.2
  A2: 0.5
  C2: 0.2
  rA: 0.3
  rC: 0.5
  
  standardize: true

  # ── Pedigree ──────────────────────────────────────────────────────────────
  N: 100000
  G_ped: 6
  G_pheno: 3
  G_sim: 8
  fam_size: 2.3
  p_mztwin: 0.02
  p_nonsocial_father: 0.05

  # ── Phenotype: frailty model ───────────────────────────────────────────────
  # hazard_model: weibull | exponential | gompertz | lognormal | loglogistic | gamma
  # hazard_params: dict of model-specific parameters

  # Trait 1
  beta1: 1.0
  beta_sex1: 0.0
  hazard_model1: weibull
  hazard_params1:
    scale: 2160
    rho: 0.8

  # Trait 2
  beta2: 1.5
  beta_sex2: 0.0
  hazard_model2: weibull
  hazard_params2:
    scale: 333
    rho: 1.2

  # ── Censoring ─────────────────────────────────────────────────────────────
  censor_age: 80
  gen_censoring:
    0: [80, 80]
    1: [80, 80]
    2: [80, 80]
    3: [40, 80]
    4: [0, 80]
    5: [0, 45]
  death_scale: 164
  death_rho: 2.73

  # ── Liability threshold model ──────────────────────────────────────────────
  prevalence1: 0.10
  prevalence2: 0.20

  # ── Misc ──────────────────────────────────────────────────────────────────
  extra_tetrachoric: False
  N_sample: 0
  plot_format: png


scenarios:
  # ── Size benchmarks ───────────────────────────────────────────────────────
  baseline10K:
    seed: 1042
    N: 10000

  baseline100K:
    seed: 2042
    N: 100000

  baseline1M:
    seed: 3042
    N: 1000000
    extra_tetrachoric: False

  baseline2M:
    folder: extra
    seed: 99042
    replicates: 3
    N: 2000000
    extra_tetrachoric: False

  # ── Heritability ──────────────────────────────────────────────────────────
  high_heritability:
    folder: heritability
    seed: 4042
    A1: 0.8
    C1: 0.0
    A2: 0.8
    C2: 0.0

  low_heritability:
    folder: heritability
    seed: 5042
    A1: 0.1
    C1: 0.1
    A2: 0.1
    C2: 0.1

  no_heritability:
    folder: heritability
    seed: 6042
    A1: 0
    C1: 0
    A2: 0
    C2: 0

  # ── More generations ───────────────────────────────────────────────────────
  long_term:
    folder: long
    seed: 1879
    rA: 0.0
    rC: 0.0
    N: 20000
    G_sim: 35
    G_ped: 30
    G_pheno: 30

  # ── Cross-trait correlation ────────────────────────────────────────────────
  no_correlation:
    folder: cross_trait
    seed: 7042
    rA: 0
    rC: 0

  high_correlation:
    folder: cross_trait
    seed: 8042
    rA: .7 # Genetic correlation
    rC: .7
    extra_tetrachoric: False

  # ── Beta / frailty strength ───────────────────────────────────────────────
  tetra_test:
    folder: phenotype
    seed: 9042
    censor_age: 200
    gen_censoring:
      0: [0, 200]
      1: [0, 200]
      2: [0, 200]
      3: [0, 200]
    beta1: 20
    beta2: 20

  beta_2:
    folder: phenotype
    seed: 10042
    beta1: 2.0
    beta2: 2.0

  beta_4:
    folder: phenotype
    seed: 11042
    beta1: 4.0
    beta2: 4.0

  beta_sex:
    folder: phenotype
    seed: 22042
    beta_sex1: 0.5
    beta_sex2: 0.5

  # ── Non-Weibull baselines ─────────────────────────────────────────────────
  lognormal_phenotype:
    folder: phenotype
    seed: 17042
    beta1: 1.0
    hazard_model1: lognormal
    hazard_params1:
      mu: 4.0
      sigma: 0.8
    beta2: 1.5
    hazard_model2: lognormal
    hazard_params2:
      mu: 3.5
      sigma: 0.6

  gamma_phenotype:
    folder: phenotype
    seed: 18042
    beta1: 1.0
    hazard_model1: gamma
    hazard_params1:
      shape: 2.0
      scale: 1000.0
    beta2: 1.5
    hazard_model2: gamma
    hazard_params2:
      shape: 3.0
      scale: 500.0

  loglogistic_phenotype:
    folder: phenotype
    seed: 19042
    beta1: 1.0
    hazard_model1: loglogistic
    hazard_params1:
      scale: 60.0
      shape: 4.0
    beta2: 1.5
    hazard_model2: loglogistic
    hazard_params2:
      scale: 40.0
      shape: 3.0

  gompertz_phenotype:
    folder: phenotype
    seed: 20042
    beta1: 1.0
    hazard_model1: gompertz
    hazard_params1:
      rate: 0.0001
      gamma: 0.05
    beta2: 1.5
    hazard_model2: gompertz
    hazard_params2:
      rate: 0.0003
      gamma: 0.07

  mixed_hazard:
    folder: phenotype
    seed: 21042
    beta1: 1.0
    hazard_model1: loglogistic
    hazard_params1:
      scale: 4
      shape: 3.5
    beta2: 1.5
    hazard_model2: lognormal
    hazard_params2:
      mu: 4.160
      sigma: 0.076

  # ── Family structure ──────────────────────────────────────────────────────
  no_twins:
    folder: family
    seed: 14042
    p_mztwin: 0

  no_fullsibs:
    folder: family
    seed: 15042
    p_nonsocial_father: 1.0

  # ── Increasing prevalence ─────────────────────────────────────────────────
  increasing_prevalence:
    folder: phenotype
    seed: 16042
    G_pheno: 4
    prevalence1:
      2: 0.03
      3: 0.05
      4: 0.08
      5: 0.12
    prevalence2:
      2: 0.03
      3: 0.05
      4: 0.08
      5: 0.12

  # ── Quick test ──────────────────────────────────────────────────────
  small_test:
    folder: test
    seed: 12042
    N: 1000