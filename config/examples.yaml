# ── Simple intro scenarios ───────────────────────────────────────────────
# Used by docs/examples/minimal-ace.md and docs/examples/adding-shared-environment.md.
# Both override only seed, replicates, and the per-trait ACE values; everything
# else (N, generation counts, censoring, phenotype model) comes from
# config/_default.yaml. Total variance is 1.0 for every trait.
#
# minimal_ace: two no-C traits at different h² (0.5 and 0.3).
# with_c: trait1 has no C, trait2 has C=0.2 (same A as trait1) — the page
# reads off the C effect from the within-scenario trait1↔trait2 comparison.
minimal_ace:
  seed: 90001
  replicates: 1
  pedigree:
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
    trait2:
      A: 0.3
      C: 0.0
      E: 0.7

with_c:
  seed: 90002
  replicates: 1
  pedigree:
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
    trait2:
      A: 0.5
      C: 0.2
      E: 0.3

am_none:
  seed: 70421
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: cure_frailty
      params:
        distribution: lognormal
        mu: 3.5
        sigma: 0.7
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1
am_weak:
  seed: 70422
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.2
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: cure_frailty
      params:
        distribution: lognormal
        mu: 3.5
        sigma: 0.7
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1
am_strong:
  seed: 70423
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.4
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: cure_frailty
      params:
        distribution: lognormal
        mu: 3.5
        sigma: 0.7
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1

# --- Observed vs liability h² (phenotype-model comparison) ---
# Same ACE and K across all three; no AM.  Only the phenotype-model family
# differs, so tetrachoric correlations on binary affected status can be
# compared head-to-head against the underlying liability correlations.

model_ltm:
  seed: 70501
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: adult
      params:
        method: ltm
        cip_x0: 16.3
        cip_k: 0.376
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1
model_frailty_wb:
  seed: 70502
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: frailty
      params:
        distribution: weibull
        scale: 2160
        rho: 0.8
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1
model_cure_frailty_ln:
  seed: 70503
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: cure_frailty
      params:
        distribution: lognormal
        mu: 3.5
        sigma: 0.7
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1

# --- Time-varying E and h² drift ---
# All eight scenarios share A=0.5, C=0, no AM, single trait, adult/LTM
# phenotype model.  All start at E=0.5 in gen 0 (identical founder state).
# Each E trajectory has a `_std` and `_nostd` variant with matched seeds, so
# the simulated liability columns are identical within a pair; only the
# binary affected status (in phenotype.parquet) differs.

e_flat_std:
  seed: 70601
  N: 100000
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  replicates: 3
  standardize: true
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E:
        0: 0.5
        1: 0.5
        2: 0.5
        3: 0.5
        4: 0.5
        5: 0.5
        6: 0.5
        7: 0.5
        8: 0.5
        9: 0.5
  phenotype:
    trait1:
      model: adult
      params:
        method: ltm
        cip_x0: 16.3
        cip_k: 0.376
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.1
