  seed: 70501
  G_sim: 10
  G_ped: 10
  G_pheno: 10
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
  phenotype:
    trait1:
      model: adult
      params:
        method: ltm
        cip_x0: 16.3
