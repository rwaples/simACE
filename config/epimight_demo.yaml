# ============================================================================
# EPIMIGHT Demo — Presentation 2026-04-08
#
# Three sets demonstrating recent EPIMIGHT R package changes:
#   A: Prevalence sweep — Bernoulli downsampling eliminates dilution bias
#   B: K=1 vs K=20 — Rubin's MI recovers precision lost by single-pair
#   C: Realistic conditions — both changes robust under censoring + C
#
# All scenarios: A=0.5, G_ped=8, G_pheno=6, G_sim=10, N=500K
# Compare Set A new results to old epimight_bias results (no downsampling).
# ============================================================================

# ── Set A: Prevalence sweep (K=20, no censoring, C=0) ────────────────────────
# Mirror of ebias_ltm_K{01..40}_C0_nocensor with deeper pedigree.
# Old results serve as "before" (diluted); these are "after" (downsampled+MI).

demo_prev01:
  seed: 70001
  N: 500000
  G_ped: 8
  G_pheno: 6
  G_sim: 10
  replicates: 1
  p_mztwin: 0
  A1: 0.5
  C1: 0.0
  E1: 0.5
  A2: 0.5
  C2: 0.0
  E2: 0.5
  rA: 0.0
  rC: 0.0
  phenotype_model1: adult
  phenotype_model2: adult
  prevalence1: 0.01
  prevalence2: 0.01
  phenotype_params1:
    method: ltm
    cip_x0: 50
    cip_k: 0.15
  phenotype_params2:
    method: ltm
    cip_x0: 50
    cip_k: 0.15
  gen_censoring: {}
  death_scale: 1000000
  death_rho: 1.0

