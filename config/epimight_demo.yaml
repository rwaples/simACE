# ── Set C: Realistic conditions (censoring + death + C=0.2) ──────────────────
# Demonstrates both changes work under real-world complications.
# Gen 2-3: oldest cohorts, late observation windows
# Gen 4-5: moderate windows
# Gen 6-7: youngest cohorts, short follow-up

demo_realistic:
  seed: 70010
  N: 500000
  G_ped: 8
  G_pheno: 6
  G_sim: 10
  replicates: 1
  p_mztwin: 0
  A1: 0.5
  C1: 0.2
  E1: 0.3
  A2: 0.5
  C2: 0.2
  E2: 0.3
  rA: 0.0
  rC: 0.0
  phenotype_model1: adult
  phenotype_model2: adult
  prevalence1: 0.10
  prevalence2: 0.10
  phenotype_params1:
    method: ltm
    cip_x0: 50
    cip_k: 0.15
  phenotype_params2:
    method: ltm
    cip_x0: 50
    cip_k: 0.15
  gen_censoring:
    2: [50, 80]
    3: [30, 80]
    4: [10, 80]
    5: [0, 80]
    6: [0, 60]
    7: [0, 40]
  death_scale: 164
  death_rho: 2.73

