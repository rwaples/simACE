# Benchmark scenarios for ace_iter_reml.
#
# A+C+E scenarios with realistic-to-the-paper values
# (sigma2 = 0.4 / 0.2 / 0.4, h2 = 0.4) at three pedigree sizes, each in
# AM-on (assort1=0.3) and no-AM (assort1=0) variants.  AM drives the
# dominant-eigenvalue spectrum that matters for the deflation
# preconditioner; the no-AM siblings isolate size-scaling from
# conditioning.
#
# N is the per-generation founder count; with G_pheno = 3 (default),
# n_phenotyped ≈ N × G_pheno → N=3400 hits ~10k, N=17000 hits ~50k,
# N=34000 hits ~100k, N=100000 hits ~300k.

iter_reml_10k:
  seed: 60010
  N: 3400
  replicates: 1
  pedigree:
    assort1: 0.3 # moderate AM → connected components grow
    assort2: 0.0
    trait1:
      A: 0.4
      C: 0.2
      E: 0.4
    trait2:
      A: 0.4
      C: 0.2
      E: 0.4

iter_reml_10k_noam:
  seed: 60011
  N: 3400
  replicates: 1
  pedigree:
    assort1: 0.0
    assort2: 0.0
    trait1:
      A: 0.4
      C: 0.2
      E: 0.4
    trait2:
      A: 0.4
      C: 0.2
      E: 0.4

