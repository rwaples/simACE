# ACE Simulation Configuration

defaults:
  # ── Globals ──────────────────────────────────────────────────────────────
  seed: 42
  replicates: 3
  folder: base
  N: 100000
  G_ped: 6
  G_pheno: 3
  G_sim: 8
  standardize: true
  plot_format: png

  # ── Pedigree (structure + variance components) ──────────────────────────
  pedigree:
    mating_lambda: 0.5
    p_mztwin: 0.02
    assort1: 0
    assort2: 0
    assort_matrix: null # optional full 2x2 R_mf matrix, e.g. [[0.3, 0.05], [0.05, 0.15]]
    trait1:
      A: 0.5
      C: 0.0
      E: 0.5
    trait2:
      A: 0.4
      C: 0.2
      E: 0.4
    rA: 0.0
    rC: 0.0
    rE: 0.0

  # ── Phenotype ───────────────────────────────────────────────────────────
  # model: frailty | cure_frailty | adult | first_passage
  # params: model-specific parameters
  #   frailty/cure_frailty: distribution key + hazard params
  #   adult: method key (ltm/cox) + cip_x0, cip_k
  phenotype:
    trait1:
      model: frailty
      params:
        distribution: weibull
        scale: 2160
        rho: 0.8
      beta: 1.0
      beta_sex: 0.0
      prevalence: 0.10
    trait2:
      model: frailty
      params:
        distribution: weibull
        scale: 333
        rho: 1.2
      beta: 1.5
      beta_sex: 0.0
      prevalence: 0.20

  # ── Censoring ───────────────────────────────────────────────────────────
  censoring:
    max_age: 80
    gen_censoring:
      0: [80, 80]
      1: [80, 80]
      2: [80, 80]
      3: [40, 80]
      4: [0, 80]
      5: [0, 45]
    death_scale: 164
    death_rho: 2.73

  # ── Sampling ────────────────────────────────────────────────────────────
  sampling:
    N_sample: 0
    case_ascertainment_ratio: 1
    pedigree_dropout_rate: 0

  # ── Analysis ────────────────────────────────────────────────────────────
  analysis:
    max_degree: 2
    estimate_inbreeding: false

  # ── EPIMIGHT ────────────────────────────────────────────────────────────
  epimight:
    K: 20 # number of MI resamples (Rubin's rules); K=1 = single draw
    rubin_level: per_year # "meta" = Meta→Rubin; "per_year" = Rubin→Meta
    kinds:
      - PO
      - FS
      - HS
      - mHS
      - pHS
      - Av
      - 1G
      - 1C

  # ── PA-FGRS ─────────────────────────────────────────────────────────────
  pafgrs:
    max_degree_pafgrs: 2

  # ── Iterative sparse REML (ace_iter_reml) ──────────────────────────────
  # Two-phase A+C+E fit: RHE-mc warm-start → PCG-AI-REML.  Defaults are
  # flat names so they can be overridden per-scenario via get_param().
  iter_reml_trait: 1               # which trait's liability to fit (1 or 2)
  iter_reml_ndegree: 2             # PA-FGRS kinship build_kinship_from_pairs depth
  iter_reml_grm_threshold: 0.001   # keep entries >~ 7th-cousin; 0.05 drops positive contributions that break PSD for matrix-free PCG
  iter_reml_phase1_probes: 100     # RHE-mc Rademacher probes
  iter_reml_phase2_probes: 60      # AI-REML Hutchinson trace probes per outer iter
  iter_reml_max_iter: 50           # AI-REML outer iter cap
  iter_reml_tol: 1.0e-2            # |dLLpred| convergence threshold (m=60 stochastic-trace floor)
  iter_reml_pcg_tol: 1.0e-5        # PCG relative residual tol
  iter_reml_pcg_max_iter: 500      # PCG max iters per V⁻¹·b solve
  iter_reml_pc_type: jacobi        # "jacobi" or "deflation"
  iter_reml_deflation_k: 100       # top-k eigenvectors of A; ignored when pc_type=jacobi
  iter_reml_trace_method: hutchinson  # "hutchinson" or "hutchpp" (shared-sketch variance reduction)
  iter_reml_hutchpp_sketch_size: 0    # sketch columns k for hutchpp; 0 → auto max(1, phase2_probes/3)
  iter_reml_compute_logdet: true      # SLQ estimate of log|V| per iter → populates logLik (enables AIC/BIC/LRT)
  iter_reml_slq_lanczos_steps: 30     # SLQ Lanczos iterations per probe
  iter_reml_slq_probes: 30            # SLQ Rademacher probe count per iter
  iter_reml_emit_probe_traces: false  # emit per-probe trace contribs to fit.probes.tsv + fit.probes.tsv.phase1 (Option-2 CV harness; default off — variance-reduction experiment closed, null result)

  # ── Export ──────────────────────────────────────────────────────────────
  # Settings for the tidy per-rep exports in `exports/` (cumulative
  # incidence TSV, pairwise relatedness TSV, sparse GRM).  These rules
  # are opt-in leaf targets — they do not run unless requested by path.
  export:
    grm_threshold: 0.05 # drop off-diagonal GRM entries below this (sparseREML default)
    pair_list_min_kinship: 0.0625 # include pairs with kinship ≥ this; 1/16 = 1st-cousin level
    pgs_r2: [0.2, 0.2] # per-trait E[cor(PGS, A)²]; PGS = √r²·A + √(Var(A)(1-r²))·e

# Scenarios are defined in per-folder files: config/{folder}.yaml
# Each file contains bare scenario dicts. The folder name is inferred from
# the filename. See any existing config/*.yaml file for the format.
